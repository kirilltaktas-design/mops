<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPS VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #111113; --accent-blue: #3b82f6; --text-main: #ffffff; --text-gray: #8e8e93; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; }
        
        .nav-tabs { display: flex; justify-content: space-around; padding: 15px 5px; border-bottom: 1px solid #1c1c1e; position: sticky; top: 0; background: var(--bg-color); z-index: 100; }
        .tab { color: var(--text-gray); font-size: 13px; font-weight: 500; cursor: pointer; padding: 5px 10px; }
        .tab.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); }

        .container { padding: 15px; display: none; }
        .container.active { display: block; }

        .section-title { font-size: 12px; color: var(--text-gray); text-transform: uppercase; margin: 20px 0 10px 5px; }
        .card-item { background: var(--card-bg); border-radius: 15px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; text-decoration: none; color: white; }
        .icon { font-size: 20px; margin-right: 15px; }
        .info { flex-grow: 1; }
        .name { font-size: 15px; font-weight: 600; }
        .sub { font-size: 11px; color: var(--text-gray); }

        .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .plan-card { background: var(--card-bg); border: 2px solid transparent; padding: 20px 15px; border-radius: 15px; }
        .plan-card.active { border-color: var(--accent-blue); }
        
        .main-btn { background: var(--accent-blue); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="tab active" onclick="showPage('profile', this)">Профиль</div>
        <div class="tab" onclick="showPage('subscribe', this)">Подписка</div>
        <div class="tab" onclick="showPage('help', this)">Помощь</div>
    </div>

    <div id="profile" class="container active">
        <div style="text-align: center; padding: 30px;">
            <div style="width: 70px; height: 70px; background: var(--accent-blue); border-radius: 50%; margin: 0 auto 15px;"></div>
            <div style="font-weight: bold; font-size: 18px;">Пользователь</div>
            <div style="color: var(--accent-blue); font-size: 13px;">Статус: Нет подписки</div>
        </div>
        <div class="card-item">
            <div class="icon">👤</div>
            <div class="info"><div class="name">Мой ID</div><div class="sub" id="u-id">Загрузка...</div></div>
        </div>
    </div>

    <div id="subscribe" class="container">
        <div class="section-title">Тарифы</div>
        <div class="plan-grid">
            <div class="plan-card active" onclick="sel(120, this)"><b>1 Месяц</b><br><small>120 ₽</small></div>
            <div class="plan-card" onclick="sel(320, this)"><b>3 Месяца</b><br><small>320 ₽</small></div>
            <div class="plan-card" onclick="sel(600, this)"><b>6 Месяцев</b><br><small>600 ₽</small></div>
            <div class="plan-card" onclick="sel(1000, this)"><b>1 Год</b><br><small>1000 ₽</small></div>
        </div>
        <button class="main-btn" id="pBtn" onclick="pay()">ОФОРМИТЬ ЗА 120 ₽</button>
    </div>

    <div id="help" class="container">
        <div class="section-title">Юридическая информация</div>
        <a href="https://telegra.ph/User-Agreement-MOPS-04-24" class="card-item">
            <div class="icon">📄</div>
            <div class="info"><div class="name">Соглашение</div><div class="sub">Правила сервиса</div></div>
        </a>
        <a href="https://telegra.ph/Privacy-Policy-MOPS-04-24" class="card-item">
            <div class="icon">🛡️</div>
            <div class="info"><div class="name">Приватность</div><div class="sub">Ваши данные</div></div>
        </a>
        <div class="section-title">Поддержка</div>
        <a href="https://t.me/MopsVpnHelp" class="card-item" style="border: 1px solid var(--accent-blue);">
            <div class="icon">🎧</div>
            <div class="info"><div class="name">Поддержка</div><div class="sub">@MopsVpnHelp</div></div>
        </a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let pr = 120;
        document.getElementById('u-id').innerText = tg.initDataUnsafe.user?.id || "Не определен";

        function showPage(p, el) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            el.classList.add('active');
        }
        function sel(p, el) {
            pr = p;
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('pBtn').innerText = `ОФОРМИТЬ ЗА ${p} ₽`;
        }
        function pay() { tg.sendData(`buy_vpn_${pr}`); tg.close(); }
    </script>
</body>
</html>
