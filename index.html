<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mops VPN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0d0d12; 
            color: white; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .card { 
            background: #1a1a24; 
            border-radius: 20px; 
            border: 1px solid #2d2d3d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .active-tab { 
            border-bottom: 2px solid #3b82f6; 
            color: #3b82f6; 
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }
        .btn-primary { 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: 14px; 
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-8 text-xs font-bold uppercase tracking-wider border-b border-gray-800 pb-3">
        <button class="active-tab px-1">Профиль</button>
        <button class="px-1 text-gray-500">Магазин</button>
        <button class="px-1 text-gray-500">Друзья</button>
        <button class="px-1 text-gray-500">Помощь</button>
    </div>

    <div class="flex flex-col items-center mb-8">
        <div class="relative">
            <div class="w-28 h-28 bg-gradient-to-tr from-blue-600 to-purple-500 rounded-full mb-3 flex items-center justify-center text-5xl shadow-2xl neon-border">
                🐶
            </div>
            <div class="absolute bottom-4 right-1 w-6 h-6 bg-green-500 border-4 border-[#0d0d12] rounded-full"></div>
        </div>
        <h1 id="user-name" class="text-2xl font-black tracking-tight">MOPS USER</h1>
        <div class="flex items-center mt-1">
            <span class="status-dot bg-red-500"></span>
            <p class="text-gray-400 text-xs font-medium uppercase">Подписка не активна</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card p-5 flex flex-col items-start">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Срок действия</p>
            <p class="text-2xl font-black text-white">0 <span class="text-sm font-normal text-gray-500">дн.</span></p>
        </div>
        <div class="card p-5 flex flex-col items-start border-blue-500/30">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Твой тариф</p>
            <p class="text-lg font-black text-blue-400 uppercase italic">Free</p>
        </div>
    </div>

    <div class="card p-4 mb-6 space-y-4">
        <div class="flex justify-between items-center">
            <span class="text-gray-400 text-sm">Трафик за месяц</span>
            <span class="font-bold">0.00 GB</span>
        </div>
        <div class="h-[1px] bg-gray-800"></div>
        <div class="flex justify-between items-center">
            <span class="text-gray-400 text-sm">Лимит устройств</span>
            <span class="font-bold text-blue-400">1 / 3</span>
        </div>
    </div>

    <div class="fixed bottom-6 left-4 right-4">
        <button id="pay-btn" class="w-full btn-primary py-5 text-lg shadow-xl neon-border uppercase tracking-widest">
            Купить доступ — 149₽
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на всё окно
        tg.headerColor = '#0d0d12'; // Красим шапку в цвет фона

        // Подставляем имя юзера из Телеги
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
        }

        // Логика кнопки
        document.getElementById('pay-btn').addEventListener('click', () => {
            tg.sendData("buy_subscription_standard"); // Отправит боту сигнал
            tg.close(); // Закроет мини-апп после нажатия
        });
    </script>
</body>
</html>
