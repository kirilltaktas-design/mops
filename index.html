<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOPS VPN Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .neon-card { 
            border: 2px solid #00f2ff; 
            border-radius: 25px; 
            padding: 30px; 
            background: #151515; 
            box-shadow: 0 0 20px #00f2ff44; 
            max-width: 300px; 
            margin: 40px auto; 
        }
        h2 { margin: 0; letter-spacing: 2px; color: #fff; }
        .price { font-size: 54px; font-weight: 800; color: #00f2ff; margin: 15px 0; }
        .features { text-align: left; list-style: none; padding: 0; margin: 25px 0; color: #bbb; line-height: 1.8; }
        .btn { 
            background: #00f2ff; 
            color: black; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            box-shadow: 0 0 10px #00f2ff88;
        }
        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="neon-card">
        <h2>СТАНДАРТ</h2>
        <div class="price">120₽</div>
        <ul class="features">
            <li>⚡ Скорость до 1 Гбит/с</li>
            <li>📱 1 устройство</li>
            <li>🌍 Все локации</li>
            <li>🛡️ Протокол VLESS</li>
        </ul>
        <button class="btn" onclick="buyPlan()">КУПИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        function buyPlan() {
            tg.sendData("buy_vpn_120"); 
            tg.close();
        }
    </script>
</body>
</html>
