<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOPS VPN Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; padding-bottom: 80px; }
        .container { max-width: 340px; margin: 0 auto; }
        h1 { margin: 0 0 30px; letter-spacing: 2px; color: #fff; text-transform: uppercase; font-size: 24px;}
        
        /* Стили для тарифа */
        .neon-card { 
            border: 2px solid #00f2ff; 
            border-radius: 25px; 
            padding: 25px; 
            background: #151515; 
            box-shadow: 0 0 15px #00f2ff33; 
            margin-bottom: 30px;
        }
        h2 { margin: 0; letter-spacing: 1px; color: #fff; font-size: 18px; }
        .price { font-size: 50px; font-weight: 800; color: #00f2ff; margin: 10px 0; }
        .features { text-align: left; list-style: none; padding: 0; margin: 20px 0; color: #bbb; line-height: 1.6; font-size: 14px;}
        .features li { margin-bottom: 8px; }
        .btn-buy { 
            background: #00f2ff; 
            color: black; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            box-shadow: 0 0 10px #00f2ff66;
            text-transform: uppercase;
        }
        .btn-buy:active { transform: scale(0.97); }

        /* Стили для инструкций (как на референсе) */
        .instr-section { text-align: left; margin-top: 20px;}
        .instr-title { color: #888; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; margin-bottom: 10px; padding-left: 10px;}
        
        .instr-card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none; /* Убираем подчеркивание ссылки */
            color: white;
            transition: background 0.2s;
        }
        .instr-card:active { background: #252525; }
        
        .instr-icon { width: 30px; height: 30px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px;}
        .instr-text { flex-grow: 1; }
        .instr-name { font-weight: bold; font-size: 15px; margin-bottom: 2px;}
        .instr-desc { color: #888; font-size: 12px; }
        .instr-arrow { color: #444; font-size: 18px; margin-left: 10px;}

        /* Простой статус-бар внизу */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            padding: 15px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            color: #555;
        }
        .status-item.active { color: #00f2ff; font-weight: bold; }

    </style>
</head>
<body>
    <div class="container">
        <h1>MOPS VPN</h1>

        <div class="neon-card">
            <h2>СТАНДАРТ</h2>
            <div class="price">120₽</div>
            <ul class="features">
                <li>⚡ Скорость до 1 Гбит/с</li>
                <li>📱 1 устройство</li>
                <li>🌍 Все локации</li>
                <li>🛡️ Протокол VLESS</li>
            </ul>
            <button class="btn-buy" onclick="buyPlan()">Оформить</button>
        </div>

        <div class="instr-section">
            <div class="instr-title">Инструкции и Приложения</div>
            
            <a href="https://apps.apple.com/app/v2box-vless-vmess/id1640412850" target="_blank" class="instr-card">
                <div class="instr-icon">🍏</div>
                <div class="instr-text">
                    <div class="instr-name">iOS / macOS</div>
                    <div class="instr-desc">Рекомендуем: V2Box</div>
                </div>
                <div class="instr-arrow">➜</div>
            </a>

            <a href="https://play.google.com/store/apps/details?id=com.v2ray.ang" target="_blank" class="instr-card">
                <div class="instr-icon">🤖</div>
                <div class="instr-text">
                    <div class="instr-name">Android</div>
                    <div class="instr-desc">Рекомендуем: v2rayNG</div>
                </div>
                <div class="instr-arrow">➜</div>
            </a>
            
            <a href="https://t.me/твой_ник_поддержки" target="_blank" class="instr-card">
                <div class="instr-icon">🆘</div>
                <div class="instr-text">
                    <div class="instr-name">Служба поддержки</div>
                    <div class="instr-desc">@твой_ник_поддержки</div>
                </div>
                <div class="instr-arrow">➜</div>
            </a>
        </div>
    </div>
    
    <div class="status-bar">
        <div class="status-item active">Магазин</div>
        <div class="status-item">Профиль</div>
        <div class="status-item">Задачи</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        function buyPlan() {
            tg.sendData("buy_vpn_120"); 
            tg.close();
        }
    </script>
</body>
</html>
